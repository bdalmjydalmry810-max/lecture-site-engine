# Kotlin & Jetpack Compose — derived from kotlin/برومت.txt
schema_version: "1.0"

subject:
  id: kotlin-android
  name_ar: "تطوير تطبيقات Android"
  name_en: "Android Development — Kotlin & Jetpack Compose"
  tagline: "أساسيات + تخطيط + حالة + تفاعل"
  section_label: "القسم العملي"

locale:
  language: ar
  direction: rtl
  terms_in_backticks: true
  inline_code_comments: english
  extra_explanation_tag: "(شرح زيادة للفهم)"
  not_in_lecture_tag: "(غير مشروحة في المحاضرة)"

domain: programming

domain_profile:
  content_types: [theory, code, commands, tables]
  forbid_adding: []
  prerequisites: ["أساسيات برمجة"]

lecture:
  unit_label: "المختبر"
  split_regex: "^# المختبر "
  title_pattern: "# المختبر {num} — {title_en} ({title_ar})"
  intro_blockquote: true

parts:
  integration_map:
    enabled: true
    heading: "📌 خريطة التكامل (أين تقع هذه المحاضرة في دورة التطوير؟)"
  detail:
    enabled: true
    heading: "الجزء الأول: الشرح التفصيلي (سطر بسطر / فقرة بفقرة)"
    numbered_sections: true
    require_per_section: [original_quote, simplified_explanation]
  summary:
    enabled: true
    heading: "الجزء الثاني: ملخص منظم (نسخة محسنة وغنية)"
  mcq:
    enabled: true
    heading: "الجزء الثالث: أسئلة اختيار من متعدد (MCQ)"
    count: 14
    difficulty: [medium, hard]
    forbid_easy_literal: true
    distribution:
      comparisons: 40
      code_scenario: 35
      application: 25
  debug:
    enabled: false
  exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين إضافية (أكواد وتعديلات فقط — من إنشائي)"
    count_min: 4
    count_max: 6
    authored_by_guide: true
    types: [fill_gaps, code_fix]
  analysis_exercise:
    enabled: false
  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 5
  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet) — تفاعلية"
  qa_cards:
    enabled: false
  reference_code:
    enabled: false
  checklist:
    enabled: false

blocks:
  original_quote:
    enabled: true
  simplified_explanation:
    enabled: true
  code:
    enabled: true
    languages: [kotlin, xml, bash, gradle]
    require_line_explain: true
  line_explain:
    enabled: true
    format: numbered_list
  imports:
    enabled: true
  expected_output:
    enabled: true
  troubleshooting:
    enabled: true
  diagrams:
    enabled: false
  uml:
    enabled: false
  screen_description:
    enabled: false
  structured_english:
    enabled: false
  compare:
    enabled: true
  callouts:
    enabled: true
  think_prompt:
    enabled: true
    min_per_lecture: 2
  tables:
    enabled: true
  fill_gaps:
    enabled: true
  code_fix:
    enabled: true
  images_note:
    enabled: false
  qa_inline:
    enabled: false

pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: true
  lecture_types:
    - id: kotlin_basics
      match: "Kotlin Basics"
      tools: ["val/var", "main()", "fun", "String Template", "Type Inference"]
    - id: basic_layouts
      match: "Basic Layouts"
      tools: ["Column", "Row", "Arrangement", "Alignment"]
    - id: images_resources
      match: "Images & Resources"
      tools: ["painterResource", "ContentScale", "drawable-nodpi"]
    - id: state_interaction
      match: "State & Interaction"
      tools: ["remember", "mutableStateOf", "State Hoisting"]
    - id: lists
      match: "Lists"
      tools: ["LazyColumn", "items()", "Card"]
    - id: environment_setup
      match: "Environment Setup"
      tools: ["Android Studio", "AVD", "Gradle Sync", "JDK"]

assessment:
  mcq_option_letters: arabic

output:
  validation_footer: true
  schema_reference: "SCHEMA.md v1.0"
  closing_line: "ابدأ الآن. سأرسل المحاضرة في الرسالة التالية."
  checklist:
    cover_all_lecture_content: true
    hierarchical_section_numbers: true
    tables_for_comparisons: true
    english_terms_in_backticks: true
    code_marked_with_emoji: true
    mcq_with_explanation: true
