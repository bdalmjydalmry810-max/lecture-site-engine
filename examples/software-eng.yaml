  name_ar: "هندسة برمجيات 2"
  name_en: "Software Engineering 2 — Practical"
  tagline: "تحليل + تصميم + جودة + اختبار"
  section_label: "القسم العملي"

locale:
  language: ar
  direction: rtl
  terms_in_backticks: true
