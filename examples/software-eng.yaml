    difficulty: [medium, hard]
  debug:
    enabled: false
  exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين إضافية (من إعداد الدليل للتدريب)"
    count_min: 4
    count_max: 6
    authored_by_guide: true
    types: [scenario, code_fix, fill_gaps]
  analysis_exercise:
    enabled: false
  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 5
  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet)"
  qa_cards:
    enabled: false
  reference_code:
    enabled: false
  checklist:
    enabled: false

blocks:
  original_quote:
    enabled: true
  simplified_explanation:
    enabled: true
  code:
