    require_line_explain: true
  line_explain:
    enabled: true
    format: numbered_list
  imports:
    enabled: false
  expected_output:
    enabled: true
  troubleshooting:
    enabled: true
  diagrams:
    enabled: true
    types: [flowchart, usecase, class, activity]
  uml:
    enabled: true
    types: [usecase, class, activity, flowchart]
  screen_description:
    enabled: false
  structured_english:
    enabled: false
  compare:
    enabled: true
  callouts:
    enabled: true
  think_prompt:
    enabled: false
  tables:
    enabled: true
  fill_gaps:
    enabled: true
  code_fix:
    enabled: true
  images_note:
    enabled: false
  qa_inline:
    enabled: false

pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: true
  lecture_types:
    - id: uml
      match: "UML"
      tools: ["Use Case", "Activity", "Class Diagram", "diagram block"]
    - id: srs
      match: "SRS"
      tools: ["functional requirements", "non-functional", "IEEE sections"]
    - id: architecture
      match: "MVC"
      tools: ["MVC", "N-Tier", "comparison tables"]
    - id: git
      match: "Git"
      tools: ["git commands", "troubleshooting", "CLI"]
    - id: quality_testing
      match: "Cyclomatic"
      tools: ["CC calculation", "unit testing", "xUnit"]

assessment:
  mcq_option_letters: arabic

output:
  validation_footer: true
  schema_reference: "SCHEMA.md v1.0"
  closing_line: "ابدأ الآن. سأرسل المحاضرة في الرسالة التالية."
  checklist:
    cover_all_lecture_content: true
    hierarchical_section_numbers: true
    tables_for_comparisons: true
