# Systems Analysis & Design — derived from data-operations/prompt_data_processing.txt
schema_version: "1.0"

subject:
  id: data-operations
  name_ar: "تحليل وتصميم نظم المعلومات"
  name_en: "Systems Analysis & Design"
  tagline: "تحليل + مخططات + جداول + توثيق"
  section_label: "نظري/عملي"

locale:
  language: ar
  direction: rtl
  terms_in_backticks: true
  inline_code_comments: none
  extra_explanation_tag: "(شرح زيادة للفهم)"
  not_in_lecture_tag: "(غير مشروحة في المحاضرة)"

domain: analysis

domain_profile:
  content_types: [theory, diagrams, tables, pseudocode]
  forbid_adding: ["Java", "Python", "SQL"]
  prerequisites: ["مفاهيم نظم المعلومات", "DFD", "IF/ELSE"]

lecture:
  unit_label: "المحاضرة"
  split_regex: "^# المحاضرة "
  title_pattern: "# المحاضرة {num} — {title_en} ({title_ar})"
  intro_blockquote: true

parts:
  integration_map:
    enabled: true
    heading: "📌 خريطة التكامل"
  detail:
    enabled: true
    heading: "الجزء الأول: الشرح التفصيلي (سطر بسطر / فقرة بفقرة)"
    numbered_sections: true
    require_per_section: [original_quote, simplified_explanation]
  summary:
    enabled: true
    heading: "الجزء الثاني: ملخص منظم"
  mcq:
    enabled: true
    heading: "الجزء الثالث: أسئلة اختيار من متعدد (MCQ)"
    count: 14
    difficulty: [medium, hard]
    forbid_easy_literal: false
  debug:
    enabled: false
  exercise:
    enabled: false
  analysis_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تحليل وتطبيق (إضافية — من إعداد الدليل)"
    count_min: 3
    count_max: 6
    types: [case_study, diagram_completion, table_fill, written_analysis]
  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 5
  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet)"
  qa_cards:
    enabled: false
  reference_code:
    enabled: false
  checklist:
    enabled: false

blocks:
  original_quote:
    enabled: true
  simplified_explanation:
    enabled: true
  code:
    enabled: false
  line_explain:
    enabled: false
  imports:
    enabled: false
  expected_output:
    enabled: false
  troubleshooting:
    enabled: false
  diagrams:
    enabled: true
    types: [flowchart, bpmn, decision-tree, dfd]
    require_node_table: true
    require_edge_table: true
  uml:
    enabled: false
  screen_description:
    enabled: true
  structured_english:
    enabled: true
  compare:
    enabled: true
  callouts:
    enabled: true
  think_prompt:
    enabled: false
  tables:
    enabled: true
  fill_gaps:
    enabled: false
  code_fix:
    enabled: false
  images_note:
    enabled: true
  qa_inline:
    enabled: false

pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: true
  lecture_types:
    - id: bpmn
      match: "BPMN"
      tools: ["Task", "Pool", "Lane", "Gateway", "diagram block"]
    - id: decision_tables
      match: "Decision"
      tools: ["Decision Tree", "Decision Table", "conditions", "actions"]
    - id: gis
      match: "GIS"
      tools: ["screen_description", "ArcMap", "ArcCatalog"]
    - id: data_dictionary
      match: "Data Dictionary"
      tools: ["elements", "structures", "tables"]

assessment:
  mcq_option_letters: arabic

output:
  validation_footer: true
  schema_reference: "SCHEMA.md v1.0"
  closing_line: "ابدأ الآن. سأرسل المحاضرة في الرسالة التالية."
  checklist:
    cover_all_lecture_content: true
    hierarchical_section_numbers: true
    tables_for_comparisons: true
    english_terms_in_backticks: true
    code_marked_with_emoji: false
    mcq_with_explanation: true
