# Subject Brief Template — Lecture Site Engine v1.0
# هذا الملف يغطي جميع محاضرات مادة نظم التشغيل 2 (النظري الكامل) التي تشمل: التزامن، الاستعصاءات، إدارة الذاكرة، وأنظمة الملفات.

schema_version: "1.0"

# ─── Subject identity ─────────────────────────────────────────────────────────
subject:
  id: os-2-theory
  name_ar: "نظم التشغيل 2 (النظري الكامل)"
  name_en: "Operating Systems 2 (Full Theory)"
  tagline: "تزامن استعصاء ذاكرة ملفات"  # 4-word summary
  section_label: "نظري"

# ─── Locale & terminology ─────────────────────────────────────────────────────
locale:
  language: ar
  direction: rtl
  terms_in_backticks: true
  inline_code_comments: english
  extra_explanation_tag: "(شرح زيادة للفهم)"
  not_in_lecture_tag: "(غير مشروحة في المحاضرة)"

# ─── Domain ───────────────────────────────────────────────────────────────────
domain: theory  # نظري بحت، مع خوارزميات ومخططات (غير موجه لتطبيق بلغة معينة)

domain_profile:
  content_types:
    - theory
    - pseudocode
    - diagrams
    - tables
    - commands
  forbid_adding:
    - "Java"
    - "Kotlin"
    - "Python"
    - "Android"
    - "Spring"
  prerequisites:
    - "أساسيات نظم التشغيل (العمليات، الجدولة، إدارة الذاكرة الأولية)"

# ─── Lecture heading ──────────────────────────────────────────────────────────
lecture:
  unit_label: "المحاضرة"
  split_regex: "^# المحاضرة "
  title_pattern: "# {unit_label} {num} — {title_en} ({title_ar})"
  intro_blockquote: true

# ─── Parts ────────────────────────────────────────────────────────────────────
parts:

  integration_map:
    enabled: true
    heading: "📌 خريطة التكامل (أين تقع هذه المادة في مسار نظم التشغيل؟)"

  detail:
    enabled: true
    heading: "الجزء الأول: الشرح التفصيلي (سطر بسطر / فقرة بفقرة)"
    numbered_sections: true

  summary:
    enabled: true
    heading: "الجزء الثاني: ملخص منظم شامل"
    subsections:
      - definitions_table
      - components_table
      - comparisons_table
      - glossary
      - golden_points
      - common_mistakes_table
      - patterns
      - main_ideas

  mcq:
    enabled: true
    heading: "الجزء الثالث: أسئلة اختيار من متعدد (MCQ)"
    count: 16
    difficulty: [medium, hard]
    forbid_easy_literal: false
    distribution:
      comparisons: 30
      code_scenario: 40   # تطبيق الخوارزميات وحساب القيم
      application: 30

  debug:
    enabled: true
    heading: "الجزء الرابع: أسئلة تصحيح الكود (خوارزميات)"
    count: 5
    cover: [logic, misconception, return_check, dead_code]

  exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين إضافية (من إعداد الدليل للتدريب)"
    count_min: 4
    count_max: 6
    authored_by_guide: true
    types:
      - fill_gaps
      - code_fix
      - scenario

  analysis_exercise:
    enabled: false

  trace_exercise:
    enabled: true
    heading: "الجزء الرابع: تمارين تتبع التنفيذ وحساب العناوين والخوارزميات"
    count_min: 3   # مناسب جدا لـ: تحويل العناوين، خوارزمية المصرفي، استبدال الصفحات، جدولة القرص

  design_question:
    enabled: true
    heading: "الجزء الرابع: أسئلة تصميم (هيكلية)"
    count_min: 2
    types:
      - uml_design
      - architecture

  theory:
    enabled: true
    heading: "الجزء الخامس: أسئلة نظرية متوقعة بالامتحان"
    count_min: 8

  cheat_sheet:
    enabled: true
    heading: "الجزء السادس: ورقة المراجعة السريعة (Cheat Sheet)"
    subsections:
      - integration_map_table
      - golden_rules_table
      - quick_reference_tables

  qa_cards:
    enabled: true
    heading: "الجزء الرابع: بطاقات سؤال وجواب (Q&A Cards)"
    count_min: 12

  reference_code:
    enabled: false   # لا يوجد كود نهائي متكامل، فقط خوارزميات وإجراءات

  checklist:
    enabled: true
    heading: "الجزء السادس: قائمة فحص ذاتي قبل الامتحان ✅"

# ─── Blocks ───────────────────────────────────────────────────────────────────
blocks:

  original_quote:
    enabled: true

  simplified_explanation:
    enabled: true

  code:
    enabled: true
    languages: [c, bash]   # C للـ Pseudocode والـ Semaphores، و Bash لأمثلة الـ Pipe
    require_line_explain: true

  line_explain:
    enabled: true
    format: numbered_list

  imports:
    enabled: false

  expected_output:
    enabled: true

  troubleshooting:
    enabled: true

  diagrams:
    enabled: true
    types: [flowchart, decision-tree]
    require_node_table: true
    require_edge_table: true

  uml:
    enabled: true
    types: [class, activity, flowchart]

  screen_description:
    enabled: false

  algorithm:
    enabled: true   # مهم جدا لخوارزميات الإقصاء، المصرفي، جدولة القرص، استبدال الصفحات

  structured_english:
    enabled: false

  compare:
    enabled: true   # مهم لمقارنة: مسيرات vs مراقبات، تجزئة vs ترقيم، HDD vs SSD

  callouts:
    enabled: true

  think_prompt:
    enabled: true
    min_per_lecture: 3

  tables:
    enabled: true

  fill_gaps:
    enabled: true

  code_fix:
    enabled: true

  images_note:
    enabled: true

  qa_inline:
    enabled: true

  analogy:
    enabled: true   # فعال جدا لشرح: عشاء الفلاسفة، الحلاق النائم، مشكلة المنتج-المستهلك

  trade_off:
    enabled: true   # المقايضة بين: Best-fit vs Worst-fit، FIFO vs LRU

  before_after:
    enabled: true

  trace:
    enabled: true   # لتتبع تنفيذ العمليات في حالة السباق وتطبيق خوارزميات الاستبدال

# ─── Pedagogy flags ───────────────────────────────────────────────────────────
pedagogy:
  cover_every_line: true
  complete_gaps: true
  beginner_friendly: true
  explain_why: true
  daily_analogy_plus_example: true
  follow_lecture_order: true
  adapt_to_lecture_type: true

  lecture_types:
    - match: "التزامن (Synchronization)"
      tools:
        - "Race Condition"
        - "Critical Section"
        - "Peterson Solution"
        - "Semaphore"
        - "Monitor"
        - "Mutex"
        - "Producer-Consumer"
        - "Readers-Writers"
        - "Dining Philosophers"
    - match: "الاستعصاءات (Deadlocks)"
      tools:
        - "Mutual Exclusion"
        - "Hold and Wait"
        - "Circular Wait"
        - "Resource Allocation Graph"
        - "Banker's Algorithm"
        - "Safe/Unsafe State"
        - "Deadlock Recovery"
    - match: "إدارة الذاكرة (Memory Management)"
      tools:
        - "Paging"
        - "Segmentation"
        - "MMU"
        - "Logical/Physical Address"
        - "Page Table"
        - "Virtual Memory"
        - "Page Fault"
        - "FIFO/LRU/Optimal"
    - match: "الملفات والقرص (File Systems)"
      tools:
        - "File Attributes (inode)"
        - "Contiguous/Linked/Indexed Allocation"
        - "FCFS/SSTF/SCAN/C-SCAN"
        - "SSD (FTL, TRIM)"
        - "Hard/Soft Links"

# ─── Assessment ───────────────────────────────────────────────────────────────
assessment:
  mcq_option_letters: arabic

# ─── Output ───────────────────────────────────────────────────────────────────
output:
  validation_footer: true
  closing_line: "ابدأ الآن. سأرسل المحاضرة في الرسالة التالية."

  checklist_items:
    - "غطّيت كل خوارزميات المزامنة (Peterson, Semaphore, Monitor)"
    - "شرحت شروط الاستعصاء الأربعة وحلها (منع، تجنب، كشف)"
    - "غطّيت تحويل العناوين المنطقية إلى حقيقية (Paging/Segmentation)"
    - "شرحت خوارزميات استبدال الصفحات (FIFO, LRU, Optimal, Second Chance)"
    - "غطّيت خوارزميات جدولة القرص (FCFS, SSTF, SCAN, C-SCAN, LOOK)"
    - "قارنت بين HDD و SSD من حيث الأداء والإدارة"
    - "استخدمت جداول لمقارنة الاستراتيجيات (مثل التخزين المتتالي مقابل المفهرس)"
    - "كل مصطلح إنجليزي بين backticks"